# Bandcamp recommendations config
username = "jmaskell"

# How many supporters (fans) to sample per owned album
supporters_per_album = 30
# Overall cap on distinct fans whose collections we fetch
max_fans = 500
# Per-fan cap on albums read from their collection
max_albums_per_fan = 200
# How many recommendations to render
top_n = 50

# Cap on how much a single fan can influence one album's score (their shared-album
# count is clamped to this). Lower = a few high-overlap "friends" matter less and
# broad consensus matters more.
affinity_cap = 4
# Max albums from the same label/artist (Bandcamp source) in the results, so one
# label can't flood the list.
max_per_source = 2
# Initial state of the page's "hide labels/artists I already own" filter. You can
# always toggle it live in the page; this just sets the default when it opens.
hide_owned_sources = false

# --- Per-record recommendations ("By record" view) ---
# Max similar albums embedded per owned record (the main page-size lever).
per_record_pool_size = 60
# Min fans (of a record) who must own a candidate for it to appear in that
# record's similar list.
per_record_min_fans = 2

# Base seconds between requests (jitter is added on top)
request_delay = 0.7

cache_path = "cache.db"
output_path = "recommendations.html"

# --- Apple Music (optional) ---
# Link recommendations to Apple Music and filter by availability, using the
# free public iTunes Search API (no account or key needed). Set enabled = false
# to turn it off and render the page exactly as before.
[apple_music]
enabled = true
country = "gb"          # Apple storefront/country to check
request_delay = 3.0     # seconds between lookups (the API allows ~20/min)
